<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CHỦ ĐỀ 7: TÌM HIỂU LÀNG NGHỀ TRUYỀN THỐNG Ở VIỆT NAM</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background: #1a1a2e; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header-wrapper { display: flex; align-items: center; padding: 12px 20px; background: #0581be; border-bottom: 4px solid #00adef; z-index: 100; }
        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #eee; background: white; }
        .title-content { flex-grow: 1; text-align: center; margin-right: 50px; }
        .title-content h1 { font-size: 20px; font-weight: 900; color: #0ce73c; text-transform: uppercase; }

        #game-screen { flex: 1; display: none; flex-direction: row; overflow: hidden; }
        .lane { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; color: white; overflow-y: auto; }
        #lane1 { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); border-right: 4px solid #fff; }
        #lane2 { background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%); }
        
        .q-card { background: #ffffff; color: #1a1a2e; padding: 20px; border-radius: 20px; width: 95%; margin-bottom: 20px; font-weight: 900; text-align: center; font-size: 1.4rem; line-height: 1.3; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .options-container { display: flex; flex-direction: column; width: 95%; align-items: center; }
        .opt { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; cursor: pointer; margin: 8px 0; width: 100%; text-align: center; transition: 0.2s; font-weight: 700; font-size: 1.2rem; border: 1px solid rgba(255,255,255,0.2); word-wrap: break-word; }
        .opt:hover { background: rgba(255,255,255,0.2); }
        .selected { pointer-events: none; }
    </style>
</head>
<body>

<div class="header-wrapper">
    <img src="https://lh3.googleusercontent.com/u/0/d/1pvgGXoH3PeMQsKQz1SN7R02gTudoNvHR" alt="Logo" class="logo-img">
    <div class="title-content">
        <h1> CHỦ ĐỀ 7: TÌM HIỂU NGHỀ TRUYỀN THỐNG Ở VIỆT NAM</h1>
    </div>
</div>

<div id="start-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center text-white" style="background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);">
    <div class="flex flex-col items-center mb-8">
        
    </div>
    <h1 class="text-6xl font-black text-[#0ce73c] uppercase tracking-widest">SỨ GIẢ LÀNG NGHỀ</h1>
    <h2 class="text-3xl font-black text-yellow-500 uppercase tracking-[0.5em] mb-12">Tốc độ</h2>
    <button onclick="startGame()" class="px-16 py-6 text-2xl font-black bg-yellow-400 text-black rounded-full hover:scale-110 transition shadow-[0_0_30px_rgba(250,204,21,0.4)]">BẮT ĐẦU TRANH TÀI</button>
</div>

<div id="game-screen">
    <div id="lane1" class="lane">
        <div class="text-3xl font-black mb-4">ĐỘI 1</div>
        <div id="q1" class="q-card"></div>
        <div id="o1" class="options-container"></div>
    </div>
    <div id="lane2" class="lane">
        <div class="text-3xl font-black mb-4">ĐỘI 2</div>
        <div id="q2" class="q-card"></div>
        <div id="o2" class="options-container"></div>
    </div>
</div>

<div id="result-screen" class="fixed inset-0 z-50 hidden flex-col items-center justify-center bg-black/95 text-white p-10">
    <div id="res-content" class="text-center w-full max-w-2xl"></div>
    <button onclick="location.reload()" class="mt-12 py-5 px-16 bg-white text-black font-black text-xl rounded-full hover:scale-105 transition">CHƠI LẠI</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(type === 'correct' ? 600 : 200, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(type === 'correct' ? 1000 : 100, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    const questions = [
        { q: "Biện pháp quan trọng nhất giữ gìn nghề?", a: ["Triển lãm", "Truyền nghề", "Quảng bá", "Hướng nghiệp"], c: 1 },
        { q: "Lợi ích của hội thi nghề là gì?", a: ["Giao lưu", "Quảng bá", "Tôn vinh", "Tất cả đúng"], c: 3 },
        { q: "Tại sao cần cộng đồng dùng sản phẩm?", a: ["Tạo đầu ra", "Bảo tồn", "Tăng thu nhập", "Tất cả đúng"], c: 3 },
        { q: "Thái độ tốt nhất khi thực hành nghề?", a: ["Tỉ mỉ", "Làm cho xong", "Nhờ bạn", "Bỏ dở"], c: 0 },
        { q: "HS lớp 6 góp phần giữ gìn nghề bằng cách?", a: ["Chỉ xem", "Chỉ mua", "Tuyên truyền/Sáng tạo", "Không làm gì"], c: 2 }
    ];

    let p1 = { q: [...questions].sort(() => Math.random() - 0.5), idx: 0, score: 0, startTime: 0, finishTime: 0 };
    let p2 = { q: [...questions].sort(() => Math.random() - 0.5), idx: 0, score: 0, startTime: 0, finishTime: 0 };
    let finishedCount = 0;

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        p1.startTime = Date.now(); p2.startTime = Date.now();
        renderQ(1); renderQ(2);
    }

    function renderQ(team) {
        let p = (team === 1) ? p1 : p2;
        let qEl = document.getElementById('q' + team);
        let oEl = document.getElementById('o' + team);
        if(p.idx >= p.q.length) {
            p.finishTime = Date.now(); finishedCount++;
            qEl.innerText = "HOÀN THÀNH!"; oEl.innerHTML = "";
            if(finishedCount === 2) showResult();
            return;
        }
        qEl.innerText = p.q[p.idx].q;
        oEl.innerHTML = "";
        p.q[p.idx].a.forEach((txt, i) => {
            let btn = document.createElement('div');
            btn.className = "opt"; btn.innerText = txt;
            btn.onclick = () => {
                btn.classList.add('selected');
                if(i === p.q[p.idx].c) { playSound('correct'); p.score += 20; btn.style.background = "#f1c40f"; btn.style.color = "black"; }
                else { playSound('wrong'); btn.style.background = "#c0392b"; }
                setTimeout(() => { p.idx++; renderQ(team); }, 600);
            };
            oEl.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('result-screen').style.display = 'flex';
        let t1 = ((p1.finishTime - p1.startTime)/1000).toFixed(2);
        let t2 = ((p2.finishTime - p2.startTime)/1000).toFixed(2);
        let winner = (p1.score > p2.score || (p1.score === p2.score && t1 < t2)) ? "ĐỘI 1 CHIẾN THẮNG!" : (p2.score > p1.score || (p2.score === p1.score && t2 < t1) ? "ĐỘI 2 CHIẾN THẮNG!" : "HÒA NHAU!");
        document.getElementById('res-content').innerHTML = `
            <h2 class="text-5xl font-black mb-10 text-yellow-400">${winner}</h2>
            <div class="bg-white/10 p-8 rounded-3xl border border-white/20 text-2xl font-bold">
                <p class="mb-4">Đội 1: <span class="text-orange-400">${p1.score} điểm - ${t1}s</span></p>
                <p>Đội 2: <span class="text-green-400">${p2.score} điểm - ${t2}s</span></p>
            </div>`;
    }
</script>
</body>
</html>
