<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giải Mã Hình Nón - TIẾP SỨC TOÁN HỌC</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; margin: 0; padding: 0; }
        body { background: #1a1a2e; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER ĐẶC TRƯNG */
        .header-wrapper {
            display: flex; align-items: center; padding: 10px 20px;
            background: #0581be; border-bottom: 3px solid #00adef; z-index: 100;
        }
        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #eee; background: white; }
        .title-content { flex-grow: 1; text-align: center; }
        .title-content h1 { 
            font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 900; 
            color: #0ce73c; text-transform: uppercase; line-height: 1.2; letter-spacing: 1px;
        }

        /* GIAO DIỆN CHỜ */
        #start-screen {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a1a2e 0%, #0a0a14 100%); color: white; text-align: center;
        }
        .vs-logo { font-size: 100px; margin-bottom: 10px; animation: pulse 1.5s infinite; }
        .game-title { 
            font-family: 'Montserrat', sans-serif; font-size: 55px; font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; margin-bottom: 5px;
        }
        .teams-preview { display: flex; gap: 30px; margin: 30px 0; width: 85%; }
        .team-card { flex: 1; padding: 25px; border-radius: 20px; border: 3px solid rgba(255,255,255,0.2); }
        #p1-card { background: linear-gradient(135deg, #e67e22, #d35400); }
        #p2-card { background: linear-gradient(135deg, #27ae60, #1e8449); }
        .start-btn {
            font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 900; padding: 15px 60px;
            border-radius: 50px; border: none; cursor: pointer; text-transform: uppercase;
            background: linear-gradient(to right, #FFD700, #FFA500); color: #1a1a2e;
            box-shadow: 0 5px 20px rgba(255,215,0,0.4); transition: 0.3s;
        }
        .start-btn:hover { transform: scale(1.05); }

        /* GIAO DIỆN THI ĐẤU */
        #game-screen { flex: 1; display: none; }
        .lane { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        #lane1 { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); border-right: 2px solid rgba(255,255,255,0.3); }
        #lane2 { background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%); }
        
        .score { font-size: 50px; font-weight: 900; font-family: 'Montserrat', sans-serif; color: white; margin-top: -100px;}
        .progress { color: white; opacity: 0.8; margin-bottom: 20px; }
        .q-card { background: white; color: #2c3e50; padding: 25px; border-radius: 20px; width: 90%; min-height: 100px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .options { display: grid; grid-template-columns: 1fr; gap: 12px; width: 90%; }
        .opt { background: rgba(255,255,255,0.15); color: white; padding: 18px; border-radius: 12px; cursor: pointer; border: 2px solid rgba(255,255,255,0.4); font-weight: bold; transition: 0.2s; text-align: center; font-size: 18px; }
        .correct { background: #f1c40f !important; color: black !important; border-color: #f1c40f; box-shadow: 0 0 20px #f1c40f; }
        .wrong { background: #c0392b !important; opacity: 0.7; }

        /* MÀN HÌNH KẾT QUẢ CHUNG */
        #final-result {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .winner-announcement { font-family: 'Montserrat'; font-size: 40px; color: #f1c40f; text-align: center; margin-bottom: 30px; line-height: 1.5; }
        .stats-table { width: 60%; color: white; border-collapse: collapse; margin-bottom: 30px; font-size: 20px; }
        .stats-table th, .stats-table td { border: 1px solid rgba(255,255,255,0.2); padding: 15px; text-align: center; }
        .stats-table th { background: #0581be; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <img src="https://lh3.googleusercontent.com/u/0/d/1pvgGXoH3PeMQsKQz1SN7R02gTudoNvHR" alt="Logo" class="logo-img">
        <div class="title-content">
            <h1>GIẢI MÃ HÌNH NÓN: TIẾP SỨC TOÁN HỌC</h1>
        </div>
    </div>

    <div id="start-screen">
        <div class="vs-logo">🏺 VS 🍦</div>
        <h1 class="game-title">TIẾP SỨC TOÁN HỌC</h1>
        <div class="teams-preview">
            <div class="team-card" id="p1-card">
                <h2 style="font-family:Montserrat">ĐỘI NÓN LÁ</h2>
                <p>Ưu tiên Chính xác - Bứt phá Tốc độ!</p>
            </div>
            <div class="team-card" id="p2-card">
                <h2 style="font-family:Montserrat">ĐỘI KEM ỐC QUẾ</h2>
                <p>Tỉnh táo tư duy - Về đích đầu tiên!</p>
            </div>
        </div>
        <button class="start-btn" onclick="startGame()">🚀 BẮT ĐẦU TUYÊN CHIẾN</button>
    </div>

    <div id="game-screen">
        <div id="lane1" class="lane"><div class="score" id="s1">0</div><div class="progress" id="p1">Câu 1/10</div><div class="q-card" id="q1">...</div><div class="options" id="opts1"></div></div>
        <div id="lane2" class="lane"><div class="score" id="s2">0</div><div class="progress" id="p2">Câu 1/10</div><div class="q-card" id="q2">...</div><div class="options" id="opts2"></div></div>
    </div>

    <div id="final-result">
        <div class="winner-announcement" id="winner-text"></div>
        <table class="stats-table">
            <thead><tr><th>Đội</th><th>Điểm số</th><th>Thời gian</th></tr></thead>
            <tbody>
                <tr><td>Nón Lá</td><td id="res-s1">0</td><td id="res-t1">0s</td></tr>
                <tr><td>Kem Ốc Quế</td><td id="res-s2">0</td><td id="res-t2">0s</td></tr>
            </tbody>
        </table>
        <button class="start-btn" onclick="location.reload()">🔄 CHƠI LẠI</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            if(type === 'correct') { o.type = 'sine'; o.frequency.setValueAtTime(523, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1046, audioCtx.currentTime + 0.3); g.gain.setValueAtTime(0.2, audioCtx.currentTime); }
            else if(type === 'wrong') { o.type = 'sawtooth'; o.frequency.setValueAtTime(150, audioCtx.currentTime); g.gain.setValueAtTime(0.2, audioCtx.currentTime); }
            else { o.frequency.setValueAtTime(60, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); g.gain.setValueAtTime(0.1, audioCtx.currentTime); }
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + (type==='heart'?0.1:0.3));
        }

        const dataOrigin = [
           { q: "Quay tam giác vuông quanh 1 cạnh góc vuông tạo ra hình gì?", a: ["Hình nón", "Hình trụ", "Hình cầu", "Hình hộp"], c: "Hình nón" },
            { q: "Khoảng cách từ đỉnh đến tâm đáy gọi là gì?", a: ["Chiều cao", "Đường sinh", "Bán kính", "Trục"], c: "Chiều cao" },
            { q: "Hệ thức đúng liên hệ r, h, l là?", a: ["l² = r² + h²", "l = r + h", "h² = r² + l²", "r = l + h"], c: "l² = r² + h²" },
            { q: "Cho r = 3, h = 4. Độ dài đường sinh l là?", a: ["5", "7", "25", "1"], c: "5" },
            { q: "Khi cắt một hình quạt tròn từ một tấm bìa hình tròn (bán kính R=15 cm) để cuộn thành một chiếc nón có đường kính đáy 18 cm. Chiều cao h của nón là?", a: ["10cm", "12cm", "9cm", "11cm"], c: "12cm" },
    ];

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
        let startTime;
        let state = { 
            p1: { cur: 0, score: 0, qs: shuffle([...dataOrigin]), time: null }, 
            p2: { cur: 0, score: 0, qs: shuffle([...dataOrigin]), time: null } 
        };

        function startGame() {
            audioCtx.resume();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').style.display = 'flex';
            startTime = Date.now();
            setInterval(() => playSfx('heart'), 1000);
            load(1); load(2);
        }

        function load(p) {
            const s = state['p'+p];
            if(s.cur >= 10) { 
                if(!s.time) s.time = (Date.now() - startTime) / 1000;
                document.getElementById('lane'+p).innerHTML = `<h1 style="font-family:Montserrat; font-size:40px">HOÀN THÀNH!</h1><p>Đang đợi đối thủ...</p>`; 
                checkFinish();
                return; 
            }
            const d = s.qs[s.cur];
            document.getElementById('q'+p).innerText = d.q;
            document.getElementById('p'+p).innerText = `Câu ${s.cur+1}/10`;
            const b = document.getElementById('opts'+p); b.innerHTML = '';
            shuffle([...d.a]).forEach(o => {
                const btn = document.createElement('div'); btn.className = 'opt'; btn.innerText = o;
                btn.onclick = () => {
                    if(btn.parentElement.classList.contains('locked')) return;
                    btn.parentElement.classList.add('locked');
                    if(o === d.c) { playSfx('correct'); btn.classList.add('correct'); s.score+=10; document.getElementById('s'+p).innerText = s.score; }
                    else { playSfx('wrong'); btn.classList.add('wrong'); }
                    setTimeout(() => { s.cur++; btn.parentElement.classList.remove('locked'); load(p); }, 600);
                };
                b.appendChild(btn);
            });
        }

        function checkFinish() {
            if(state.p1.time && state.p2.time) {
                setTimeout(showFinalResult, 1000);
            }
        }

        function showFinalResult() {
            document.getElementById('final-result').style.display = 'flex';
            document.getElementById('res-s1').innerText = state.p1.score;
            document.getElementById('res-t1').innerText = state.p1.time.toFixed(2) + 's';
            document.getElementById('res-s2').innerText = state.p2.score;
            document.getElementById('res-t2').innerText = state.p2.time.toFixed(2) + 's';

            let winnerText = "";
            // Logic so sánh: Điểm cao nhất -> Thời gian thấp nhất
            if (state.p1.score > state.p2.score) {
                winnerText = "🏆 CHIẾN THẮNG THUỘC VỀ: ĐỘI NÓN LÁ<br>(Điểm số cao hơn)";
            } else if (state.p2.score > state.p1.score) {
                winnerText = "🏆 CHIẾN THẮNG THUỘC VỀ: ĐỘI KEM ỐC QUẾ<br>(Điểm số cao hơn)";
            } else {
                // Nếu bằng điểm, so sánh thời gian
                if (state.p1.time < state.p2.time) {
                    winnerText = "🏆 CHIẾN THẮNG THUỘC VỀ: ĐỘI NÓN LÁ<br>(Cùng điểm - Tốc độ nhanh hơn)";
                } else if (state.p2.time < state.p1.time) {
                    winnerText = "🏆 CHIẾN THẮNG THUỘC VỀ: ĐỘI KEM ỐC QUẾ<br>(Cùng điểm - Tốc độ nhanh hơn)";
                } else {
                    winnerText = "🤝 KẾT QUẢ HÒA!<br>(Bằng điểm và Bằng thời gian)";
                }
            }
            document.getElementById('winner-text').innerHTML = winnerText;
        }
    </script>
</body>
</html>
